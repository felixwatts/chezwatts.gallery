<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chez Watts Gallery</title>

    <!-- Bootstrap -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Raleway' rel='stylesheet' type='text/css'>

    <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
      <![endif]-->
  </head>
  <body>

      <style>

        html {
          position: relative;
          min-height: 100%;
      }

      body {
          /* Margin bottom by footer height */
          margin-bottom: 60px;
      }

      .footer {
          position: absolute;
          bottom: 0;
          width: 100%;
          /* Set the fixed height of the footer here */
          height: 60px;
          background-color: #f5f5f5;
          left: 0;
          text-align: center;
      }

      body > .container {
          padding: 0;
      }
      .container .text-muted {
          margin: 20px 0;
      }

      .footer > .container {
          padding-right: 15px;
          padding-left: 15px;
      }

      #sliderContainer {
        position: relative;
        cursor: default;
        float: left;
        width: 724px;
        height: 724px;
        overflow: hidden;
        background-color: #f5f5f5;
    }

    .gallery-slideshow__stage {
        position: relative;
        width: 724px;
        height: 724px;
        overflow: hidden;
    }

    .gallery-slideshow__layer {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        max-width: 724px;
        max-height: 724px;
        width: auto;
        height: auto;
        opacity: 0;
        transition: opacity var(--gallery-fade-ms, 700ms) ease;
        pointer-events: none;
    }

    .gallery-slideshow__layer--active {
        opacity: 1;
    }

    .navbar-brand {
        font-family: 'Raleway', sans-serif;
        font-weight: 600;           
    }

    .navbar-text {
        font-family: 'Raleway', sans-serif;
        font-weight: 400;           
    }

</style>

<nav class="navbar navbar-default" role="navigation">
  <div class="container-fluid">
    <!-- Brand and toggle get grouped for better mobile display -->
    <div class="navbar-header">
      <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
    </button>
    <a class="navbar-brand" href="/">Chez Watts</a>
    <p class="navbar-text">(Mostly) Portraits, Life Drawings and Paintings<p>
</div>

<!-- Collect the nav links, forms, and other content for toggling -->
<div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">      
  <ul class="nav navbar-nav navbar-right">
    <li>
        <script type="text/javascript" language="javascript">

        // Email obfuscator script 2.1 by Tim Williams, University of Arizona
        // Random encryption key feature by Andrew Moulden, Site Engineering Ltd
        // This code is freeware provided these four comment lines remain intact
        // A wizard to generate this code is at http://www.jottings.com/obfuscator/
        { 
            coded = "RG0PCY668@QDYzx.RhD"
                key = "69rZeQoNMEl5DBzF3Xcs1nv0KhpSdxbAjPag2R8w7TftGVOkyuJL4YHmqiCWUI"
                shift=coded.length
                link=""
                for (i=0; i<coded.length; i++) {
                    if (key.indexOf(coded.charAt(i))==-1) {
                    ltr = coded.charAt(i)
                    link += (ltr)
                }
                else {     
                    ltr = (key.indexOf(coded.charAt(i))-shift+key.length) % key.length
                    link += (key.charAt(ltr))
                }
            }
            document.write("<span class=\"navbar-text\">Contact: <a href='mailto:"+link+"'>"+link+"</a></span>")
        }

        </script>
        <noscript>Sorry, you need Javascript on to email me.</noscript>
    </li>
</ul>
</div><!-- /.navbar-collapse -->
</div><!-- /.container-fluid -->
</nav>

<div class="container">
  <!-- Example row of columns -->
  <div class="row">
    <div class="col-md-8 text-center">
      <div id="sliderContainer" class="gallery-slideshow">
        <div class="gallery-slideshow__stage" aria-live="polite"></div>
      </div>
      <script type="application/json" id="gallery-images">{{.ImagesJSON}}</script>
</div>
<div class="col-md-4">
    {{.Blurb}}
  </div>
</div>
</div>

<footer class="footer">
  <p class="text-muted">Copyright &copy; Chez Watts <time datetime="2015">2015</time></p>      
</footer>


<!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
<!-- Include all compiled plugins (below), or include individual files as needed -->
<script src="/js/bootstrap.min.js"></script>

<script src="/js/gallery-slideshow.js"></script>
<script>
    GallerySlideshow.init('sliderContainer', 'gallery-images', {
        interval: 7000,
        fadeMs: 700,
        pauseOnHover: true,
        arrowKeys: true
    });
</script>

</body>
</html>
