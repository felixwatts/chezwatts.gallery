<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chez Watts Gallery</title>

    <!-- Bootstrap -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Raleway' rel='stylesheet' type='text/css'>

    <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->

  <body>

      <style>

        html {
          position: relative;
          min-height: 100%;
      }

      body {
          /* Margin bottom by footer height */
          margin-bottom: 60px;
      }

      .footer {
          position: absolute;
          bottom: 0;
          width: 100%;
          /* Set the fixed height of the footer here */
          height: 60px;
          background-color: #f5f5f5;
          left: 0;
          text-align: center;
      }

      body > .container {
        
      }
      .container .text-muted {
          margin: 20px 0;
      }

      .footer > .container {
          padding-right: 15px;
          padding-left: 15px;

      }

      #sliderContainer {
        position: relative;
        cursor: move; 
        float: left;
        width: 700px; 
        height: 700px; 
        overflow: hidden;
    }

    #slides {
        position: relative;
        cursor: move; 
        float: left;
        width: 724px; 
        height: 724px; 
        overflow: hidden;
    }

    .navbar-brand {
        font-family: 'Raleway', sans-serif;
        font-weight: 600;                
    }

    .navbar-text {
        font-family: 'Raleway', sans-serif;
        font-weight: 400;           
    }

    .galleryPreviewLink {
        width: 500px;
        height: 100px;
        font-family: 'Raleway', sans-serif; 
        font-weight: 600; 
        color: white; 
        background-position: center; 
        font-size: 36pt;    
    }

</style>

        <span class="icon-bar"></span>
    </button>
    <a class="navbar-brand" href="#">Chez Watts</a>
    <p class="navbar-text">(Mostly) Portraits, Life Drawings and Paintings<p>
</div>

</div><!-- /.navbar-collapse -->
</div><!-- /.container-fluid -->
</nav>

<div class="container">
    <div class="col-md-6">
        <div class="row" style="padding: 16px;">
            {{.About}} 
        </div>
    </div>
    <div class="col-md-6">
        <div class="row" style="padding: 16px;">
            <h2>Rooms</h2>
            {{range .Galleries}}
            <a href="/gallery/{{.Name}}">
                {{.Name}}
            </a>
		<br>
            {{end}}   
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
    <p class="text-muted">Copyright &copy; Chez Watts <time datetime="2015">2015</time></p>      
  </div>
</footer>

</body>
</html>
